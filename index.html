			<h1 class="title">Latest Videos</h1>
			<div id="latest-videos-container">
				<span id="latest-videos-end"></span>
				<div id="latest-videos-more"><a href="https://youtube.com/@BlenderTimer/videos">View More!</a></div>
				<div id="latest-videos">
					<script type="text/javascript">
						let limit = 20;
						for (let i=videos.length-1; i >= 0; i--) {
							if (limit == 0) {break};
							if (!(videos[i].hidden && videos[i].hidden == true)) {
								var vb = document.createElement('a');
								vb.className = "latest-video-block";
								vb.id = "video-" + videos[i].id;
								vb.href = "https://youtube.com/watch?v=" + videos[i].youtubeId;
								var vType = document.createElement('img');
								vType.className = "latest-video-type";
								if (videos[i].type == "short") {
									vType.alt = "Short";
									vType.title = "This video is a short.";
									vType.src = "./static/images/icons/videotype-short.svg";
								}
								else {
									vType.alt = "Full Video";
									vType.title = "This is a full video.";
									vType.src = "./static/images/icons/videotype-longform.svg";
								}
								var y = parseInt(videos[i].date.removeBefore("-", 1, true));
								var m = parseInt(videos[i].date.removeBefore("-", 1).removeAfter("-", -1, true));
								var d = parseInt(videos[i].date.removeAfter("-", -1));
								if ((Date.now() - new Date(y, m-1, d).getTime()) <= 604800000) {
									var vNew = document.createElement('b');
									vNew.className = "latest-video-new";
									vNew.textContent = "NEW!";
									vNew.title = "This video is a recent upload!"
									vb.appendChild(vNew);
								}
								if (new Date(videos[i].date))
								var vThumb = document.createElement('img');
								vThumb.className = "latest-video-thumb";
								vThumb.alt = "Thumbnail";
								vThumb.src = "./video-thumbnails/" + videos[i].id + "-small.png";
								var vTitle = document.createElement('div');
								vTitle.className = "latest-video-title";
								vTitle.innerHTML = "<p>" + videos[i].title + "</p>"
								vb.appendChild(vType);
								vb.appendChild(vThumb);
								vb.appendChild(vTitle);
								document.getElementById('latest-videos').appendChild(vb);
								limit -= 1;
							}
						}
					</script>
